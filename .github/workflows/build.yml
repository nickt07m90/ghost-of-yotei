name: Build Walkthrough Tracker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate index.html
        run: python build_tracker.py

      - name: Commit and push index.html, remove source files
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add index.html
          git rm --ignore-unmatch build_tracker.py walkthrough.txt
          git commit -m "Generate index.html from walkthrough"
          git push
